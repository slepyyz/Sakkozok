<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script type="module" src="index.js"></script>
        <link rel="stylesheet" href="style.css">
        <title>Szontagh Ágoston</title>
    </head>
    <body>
        <main>
            <header>
                <h1>Híres sakkozók</h1>
            </header>

            <article>
                <table border="1">
                    <thead>
                        <tr>
                            <th id="nev">Név</th>
                            <th id="nemzetiseg">Nemzetiség</th>
                            <th id="nyert">Győzelmek száma</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </article>

            <section>
                <h2>Sakktábla pozíciók</h2>
                <div>
                    <label for="pozicio1">1. pozíció:</label>
                    <input
                        type="text"
                        id="pozicio1"
                        name="pozicio1"
                        placeholder="pl. e4"
                    />
                </div>

                <div>
                    <label for="pozicio2">2. pozíció:</label>
                    <input
                        type="text"
                        id="pozicio2"
                        name="pozicio2"
                        placeholder="pl. d5"
                    />
                </div>
                <button>OK</button>
            </section>

            <footer>
                <p>&copy; Szontagh Ágoston</p>
            </footer>
        </main>
    </body>
</html>
